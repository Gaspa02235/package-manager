<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Gymmies Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Login-specific styles */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-black);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .login-bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-glow 4s ease-in-out infinite;
        }
        .login-bg-lines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 60px,
                rgba(255,255,255,0.015) 60px,
                rgba(255,255,255,0.015) 61px
            );
        }

        /* Login Card */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: var(--space-lg);
        }

        .login-card {
            background: var(--color-dark-2);
            border: 1px solid var(--color-gray-1);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(230,57,70,0.1);
            animation: slide-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header {
            background: linear-gradient(135deg, #1a0a0a 0%, var(--color-dark-3) 100%);
            border-bottom: 1px solid var(--color-gray-1);
            padding: var(--space-2xl) var(--space-2xl) var(--space-xl);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-header::before {
            content: '';
            position: absolute;
            bottom: -40px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 80px;
            background: radial-gradient(ellipse, var(--color-red-glow) 0%, transparent 70%);
        }

        .login-panda {
            font-size: 4rem;
            display: block;
            margin-bottom: var(--space-sm);
            animation: float 3s ease-in-out infinite;
            position: relative;
        }
        .login-brand {
            font-family: var(--font-display);
            font-size: 2.8rem;
            letter-spacing: 0.08em;
            color: var(--color-white);
            line-height: 1;
            display: block;
        }
        .login-tagline {
            font-family: var(--font-cond);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-red);
            margin-top: var(--space-xs);
            display: block;
        }

        /* Role Selector */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
            padding: var(--space-xl) var(--space-xl) 0;
        }
        .role-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-md);
            background: var(--color-dark-3);
            border: 2px solid var(--color-gray-1);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
        }
        .role-btn:hover,
        .role-btn.active {
            border-color: var(--color-red);
            background: rgba(230,57,70,0.08);
        }
        .role-btn.active .role-icon { filter: none; }
        .role-icon { font-size: 1.8rem; }
        .role-name {
            font-family: var(--font-cond);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-gray-3);
        }
        .role-btn.active .role-name { color: var(--color-red); }

        /* Form body */
        .login-body {
            padding: var(--space-xl) var(--space-xl) var(--space-2xl);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .login-body .form-group { gap: var(--space-sm); display: flex; flex-direction: column; }
        .login-body .form-label {
            font-family: var(--font-cond);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-gray-3);
        }
        .login-body .form-input {
            background: var(--color-dark-3);
            border: 1px solid var(--color-gray-2);
            border-radius: var(--radius-md);
            padding: 0.8rem var(--space-md);
            color: var(--color-light);
            font-size: 1rem;
            transition: all var(--transition);
            outline: none;
            width: 100%;
        }
        .login-body .form-input:focus {
            border-color: var(--color-red);
            box-shadow: 0 0 0 3px var(--color-red-glow);
        }

        .login-error {
            background: rgba(230, 57, 70, 0.12);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-red-light);
            font-size: 0.85rem;
            text-align: center;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97);
        }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(3px); }
            30%, 50%, 70% { transform: translateX(-3px); }
            40%, 60% { transform: translateX(3px); }
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            justify-content: center;
            margin-top: var(--space-xs);
        }

        /* Hints */
        .login-hints {
            margin-top: var(--space-lg);
            border-top: 1px solid var(--color-gray-1);
            padding-top: var(--space-md);
        }
        .login-hints p {
            font-size: 0.75rem;
            color: var(--color-gray-2);
            text-align: center;
            margin-bottom: var(--space-sm);
            font-family: var(--font-cond);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .hints-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }
        .hint-card {
            background: var(--color-dark-3);
            border: 1px solid var(--color-gray-1);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            font-size: 0.78rem;
            color: var(--color-gray-3);
            line-height: 1.6;
            cursor: pointer;
            transition: all var(--transition);
        }
        .hint-card:hover { border-color: var(--color-red); color: var(--color-light); }
        .hint-card strong {
            display: block;
            color: var(--color-gray-4);
            font-family: var(--font-cond);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.72rem;
            margin-bottom: 2px;
        }
        .hint-role {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: var(--radius-full);
            margin-bottom: 4px;
        }
        .hint-role.admin { background: rgba(230,57,70,0.2); color: var(--color-red-light); }
        .hint-role.buyer { background: rgba(100,200,100,0.15); color: #7dd47d; }
    </style>
</head>
<body>

<div class="login-bg">
    <div class="login-bg-glow"></div>
    <div class="login-bg-lines"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Header -->
        <div class="login-header">
            <span class="login-panda">🐼</span>
            <span class="login-brand">GYMMIES</span>
            <span class="login-tagline">Unleash Your Inner Strength</span>
        </div>

        <!-- Role Selector (visual only) -->
        <div class="role-selector">
            <div class="role-btn" id="role-admin" onclick="setRole('admin')">
                <span class="role-icon">🛡️</span>
                <span class="role-name">Administrador</span>
            </div>
            <div class="role-btn" id="role-comprador" onclick="setRole('comprador')">
                <span class="role-icon">🛒</span>
                <span class="role-name">Comprador</span>
            </div>
        </div>

        <!-- Form -->
        <div class="login-body">

            {% if error %}
            <div class="login-error">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <div class="form-group">
                        <label class="form-label" for="usuario">👤 Usuario</label>
                        <input
                            class="form-input"
                            type="text"
                            id="usuario"
                            name="usuario"
                            placeholder="Ingresa tu usuario"
                            required
                            autocomplete="username"
                        >
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">🔒 Contraseña</label>
                        <div style="position:relative;">
                            <input
                                class="form-input"
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Ingresa tu contraseña"
                                required
                                autocomplete="current-password"
                                style="padding-right: 3rem;"
                            >
                            <button type="button" onclick="togglePass()" style="
                                position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                background:none; border:none; cursor:pointer; font-size:1.1rem; color:var(--color-gray-3);
                            " title="Mostrar/ocultar">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary login-btn">
                        ⚡ Ingresar
                    </button>
                </div>
            </form>

            <!-- Credential Hints -->
            <div class="login-hints">
                <p>Credenciales de acceso</p>
                <div class="hints-grid">
                    <div class="hint-card" onclick="fillCredentials('admin','admin123')">
                        <span class="hint-role admin">Admin</span>
                        <strong>Usuario:</strong> admin
                        <br><strong>Pass:</strong> admin123
                    </div>
                    <div class="hint-card" onclick="fillCredentials('comprador','gym2024')">
                        <span class="hint-role buyer">Comprador</span>
                        <strong>Usuario:</strong> comprador
                        <br><strong>Pass:</strong> gym2024
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
function togglePass() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

function fillCredentials(user, pass) {
    document.getElementById('usuario').value = user;
    document.getElementById('password').value = pass;
    // highlight active role
    if (user === 'admin') setRole('admin');
    else setRole('comprador');
}

function setRole(role) {
    document.getElementById('role-admin').classList.toggle('active', role === 'admin');
    document.getElementById('role-comprador').classList.toggle('active', role === 'comprador');
}

// Auto-detect role from username input
document.getElementById('usuario').addEventListener('input', function() {
    const val = this.value.toLowerCase();
    if (val === 'admin') setRole('admin');
    else if (val === 'comprador') setRole('comprador');
    else { document.getElementById('role-admin').classList.remove('active'); document.getElementById('role-comprador').classList.remove('active'); }
});
</script>

</body>
</html>
